const sb = async (path, options = {}) => {
  const method = options.method || "GET";
  const url = `${SUPABASE_URL}/rest/v1/${path}`;
  const headers = {
    "apikey": SUPABASE_KEY,
    "Authorization": `Bearer ${SUPABASE_KEY}`,
    "Content-Type": "application/json",
    "Accept": "application/json",
  };
  if (method === "POST") headers["Prefer"] = "return=representation";
  try {
    const res = await fetch(url, { method, headers, mode: "cors", body: options.body || undefined });
    const text = await res.text();
    if (!res.ok) throw new Error(text);
    return text ? JSON.parse(text) : [];
  } catch(e) {
    console.error("API Error:", e.message);
    throw e;
  }
};

const PAYMENTS = ["現金", "クレジット", "QRコード決済", "スマート支払い"];

const isRepeatFromVisit = (visitCount) => visitCount !== "初回";

const toRecord = (r) => ({
  id: r.id, date: r.date, staff: r.staff,
  nailMenu: r.nail_menu || "",
  nailMenus: r.nail_menu ? r.nail_menu.split("・") : ["ハンド"],
  nailPrice: r.nail_price || 0,
  visitCount: r.visit_count || (r.is_repeat ? "2回目以上" : "初回"),
  isRepeat: r.visit_count ? r.visit_count !== "初回" : (r.is_repeat || false),

  hanpai: {

  },

  note: r.note || "",
});

const calcStats = (records) => {
  const result = {};
  records.forEach((r) => {
    if (!result[r.staff]) result[r.staff] = {
      nailTotal:0, hanpaiTotal:0, total:0, count:0, repeat:0, shimei:0,
      visitCounts:{"初回":0,"2回目":0,"3回目":0,"4回目以上":0},
      menuCounts:{"ハンド":0,"フット":0,"当店offのみ":0,"他店offのみ":0},
      payment:{"現金":0,"クレジット":0,"QRコード決済":0,"スマート支払い":0},
      hanpai:{"KOYO物販":0,"ガモウ物販":0,"ネイル物販":0,"プロテイン":0}
    };
    const d = result[r.staff];
    d.nailTotal += r.nailPrice; d.hanpaiTotal += r.hanpaiTotal;
    d.total += r.nailPrice + r.hanpaiTotal; d.count += 1;
    if (r.isRepeat) d.repeat += 1;
    if (r.shimei) d.shimei += 1;
    if (r.payment) d.payment[r.payment] = (d.payment[r.payment] || 0) + 1;
    const vc = r.visitCount || "初回";
    if (d.visitCounts[vc] !== undefined) d.visitCounts[vc] += 1;
    const menus = r.nailMenus || [r.nailMenu];
    menus.forEach(m => { if (d.menuCounts[m] !== undefined) d.menuCounts[m] += 1; });
    HANPAI_MENUS.forEach(m => { d.hanpai[m] += r.hanpai[m] || 0; });
  });
  return result;
};

const calcVisitCounts = (records) => {
  const result = {"初回":0,"2回目":0,"3回目":0,"4回目以上":0};
  records.forEach(r => { const vc = r.visitCount||"初回"; if (result[vc]!==undefined) result[vc]+=1; });
  return result;
};

const calcMenuCounts = (records) => {
  const result = {"ハンド":0,"フット":0,"当店offのみ":0,"他店offのみ":0};
  records.forEach(r => { const menus=r.nailMenus||[r.nailMenu]; menus.forEach(m=>{if(result[m]!==undefined)result[m]+=1;}); });
  return result;
};

const exportCSV = (selectedMonth, mr, byStaff, isOwner) => {
  const nailTotal=mr.reduce((s,r)=>s+r.nailPrice,0);
  const hanpaiTotal=mr.reduce((s,r)=>s+r.hanpaiTotal,0);
  const total=nailTotal+hanpaiTotal;
  const repeatRate=mr.length>0?Math.round((mr.filter(r=>r.isRepeat).length/mr.length)*100):0;
  const shimeiRate=mr.length>0?Math.round((mr.filter(r=>r.shimei).length/mr.length)*100):0;
  const avg=mr.length>0?Math.round(nailTotal/mr.length):0;
  const visitCounts=calcVisitCounts(mr); const menuCounts=calcMenuCounts(mr);
  let csv="\uFEFF";
  csv+=`月間売上レポート,${selectedMonth}\n\n`;
  csv+=`【売上サマリー】\n総売上,${total}\n施術売上,${nailTotal}\n店販売上,${hanpaiTotal}\n`;
  csv+=`客数,${mr.length}\n客単価,${avg}\n初回,${visitCounts["初回"]}\n`;
  csv+=`リピート率,${repeatRate}%\n指名率,${shimeiRate}%\n\n`;
  csv+=`【来店回数別】\n来店回数,件数,比率\n`;
  VISIT_COUNTS.forEach(v=>{const cnt=visitCounts[v]||0;const pct=mr.length>0?Math.round((cnt/mr.length)*100):0;csv+=`${v},${cnt},${pct}%\n`;});
  csv+=`\n【メニュー別】\nメニュー,件数,比率\n`;
  NAIL_MENUS.forEach(m=>{const cnt=menuCounts[m]||0;const pct=mr.length>0?Math.round((cnt/mr.length)*100):0;csv+=`${m},${cnt},${pct}%\n`;});
  csv+=`\n【決済方法別】\n決済方法,件数,比率\n`;
  PAYMENTS.forEach(p=>{const cnt=mr.filter(r=>r.payment===p).length;const pct=mr.length>0?Math.round((cnt/mr.length)*100):0;csv+=`${p},${cnt},${pct}%\n`;});
  csv+=`\n【物販カテゴリ別】\nカテゴリ,売上\n`;
  HANPAI_MENUS.forEach(m=>{const t=mr.reduce((s,r)=>s+(r.hanpai[m]||0),0);csv+=`${m},${t}\n`;});
  if (isOwner) {
    csv+=`\n【スタッフ別売上】\nスタッフ,売上,客数,客単価,リピート率\n`;
    STAFF_LIST.forEach(s=>{const d=byStaff[s.name];if(!d){csv+=`${s.name},0,0,0,0%\n`;return;}const sAvg=d.count>0?Math.round(d.nailTotal/d.count):0;const sRepeat=d.count>0?Math.round((d.repeat/d.count)*100):0;csv+=`${s.name},${d.total},${d.count},${sAvg},${sRepeat}%\n`;});
  }
  csv+=`\n【明細】\n日付,スタッフ,メニュー,施術売上,店販売上,来店回数,指名,決済方法\n`;
  mr.forEach(r=>{const menus=(r.nailMenus||[r.nailMenu]).join("・");csv+=`${r.date},${r.staff},${menus},${r.nailPrice},${r.hanpaiTotal},${r.visitCount||"初回"},${r.shimei?"指名あり":"指名なし"},${r.payment}\n`;});
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`売上レポート_${selectedMonth}.csv`;a.click();
  URL.revokeObjectURL(url);
};

function LoginScreen({onLogin}){
  const [selectedId,setSelectedId]=useState("");
  const [password,setPassword]=useState("");
  const [error,setError]=useState("");
  const handleLogin=()=>{
    const user=STAFF_LIST.find(s=>s.id===selectedId);
    if(!user){setError("スタッフを選択してください");return;}
    if(user.password!==password){setError("パスワードが違います");return;}
    onLogin(user);
  };
  return(
    <div style={{fontFamily:"sans-serif",background:"#fdf8f4",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"white",borderRadius:20,padding:28,width:"100%",maxWidth:360,boxShadow:"0 4px 24px rgba(0,0,0,0.08)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:11,letterSpacing:3,color:"#a07850",marginBottom:6}}>燈乃工房・本店</div>
          <div style={{fontSize:22,fontWeight:700,color:"#2d2016"}}>売上管理</div>
        </div>
        <FR label="スタッフを選択">
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {STAFF_LIST.map(s=>(
              <button key={s.id} onClick={()=>{setSelectedId(s.id);setPassword("");setError("");}}
                style={{...cS,padding:"12px 16px",background:selectedId===s.id?"#a07850":"#f0e8de",color:selectedId===s.id?"white":"#a07850",textAlign:"left",borderRadius:12}}>
                {s.name} {s.role==="owner"&&"👑"}
              </button>
            ))}
          </div>
        </FR>
        <FR label="パスワード">
          <input type="password" placeholder="パスワードを入力" value={password}
            onChange={e=>{setPassword(e.target.value);setError("");}}
            onKeyDown={e=>e.key==="Enter"&&handleLogin()} style={iS}/>
        </FR>
        {error&&<div style={{color:"#e05050",fontSize:13,marginBottom:12,textAlign:"center"}}>{error}</div>}
        <button onClick={handleLogin}
          style={{width:"100%",padding:14,background:"linear-gradient(135deg,#c8a882,#a07850)",color:"white",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}}>
          ログイン
        </button>
      </div>
    </div>
  );
}

// ★ スタッフ用 個人年間ビュー
function StaffAnnualView({records, currentUser}){
  const [selectedYear, setSelectedYear] = useState(String(new Date().getFullYear()));
  const myRecords = records.filter(r=>r.staff===currentUser.name);
  const years = ["2024","2025","2026"];

  // 月ごとの集計
  const monthlyData = useMemo(()=>{
    const result = {};
    for(let m=1;m<=12;m++){
      const key=`${selectedYear}-${String(m).padStart(2,"0")}`;
      const mr=myRecords.filter(r=>r.date.startsWith(key));
      const nailTotal=mr.reduce((s,r)=>s+r.nailPrice,0);
      const hanpaiTotal=mr.reduce((s,r)=>s+r.hanpaiTotal,0);
      const total=nailTotal+hanpaiTotal;
      const count=mr.length;
      const repeat=mr.filter(r=>r.isRepeat).length;
      const shimei=mr.filter(r=>r.shimei).length;
      result[m]={total,nailTotal,hanpaiTotal,count,repeat,shimei,mr};
    }
    return result;
  },[myRecords,selectedYear]);

  const yearTotal=Object.values(monthlyData).reduce((s,d)=>s+d.total,0);
  const yearCount=Object.values(monthlyData).reduce((s,d)=>s+d.count,0);
  const yearRepeat=Object.values(monthlyData).reduce((s,d)=>s+d.repeat,0);
  const yearShimei=Object.values(monthlyData).reduce((s,d)=>s+d.shimei,0);
  const yearAvg=yearCount>0?Math.round(yearTotal/yearCount):0;
  const yearRepeatRate=yearCount>0?Math.round(yearRepeat/yearCount*100):0;
  const yearShimeiRate=yearCount>0?Math.round(yearShimei/yearCount*100):0;

  const maxMonthTotal=Math.max(1,...Object.values(monthlyData).map(d=>d.total));
  const [expandedMonth,setExpandedMonth]=useState(null);

  return(
    <div>
      {/* 年選択 */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {years.map(y=>(
          <button key={y} onClick={()=>setSelectedYear(y)}
            style={{...cS,background:selectedYear===y?"#a07850":"#f0e8de",color:selectedYear===y?"white":"#a07850"}}>
            {y}年
          </button>
        ))}
      </div>

      {/* 年間ヒーロー */}
      <div style={{background:"linear-gradient(135deg,#c8a882,#a07850)",borderRadius:20,padding:20,color:"white",marginBottom:16,boxShadow:"0 4px 20px rgba(160,120,80,0.3)"}}>
        <div style={{fontSize:11,opacity:0.75,marginBottom:4}}>{selectedYear}年 個人年間売上</div>
        <div style={{fontSize:32,fontWeight:700,marginBottom:12}}>¥{yearTotal.toLocaleString()}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[
            {label:"客数",value:yearCount+"名"},
            {label:"客単価",value:"¥"+yearAvg.toLocaleString()},
            {label:"リピート率",value:yearRepeatRate+"%"},
            {label:"指名率",value:yearShimeiRate+"%"},
            {label:"初回",value:(yearCount-yearRepeat)+"名"},
            {label:"リピート",value:yearRepeat+"名"},
          ].map(({label,value})=>(
            <div key={label} style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px",textAlign:"center"}}>
              <div style={{fontSize:10,opacity:0.75,marginBottom:3}}>{label}</div>
              <div style={{fontWeight:700,fontSize:14}}>{value}</div>
            </div>
          ))}
        </div>
      </div>

      {/* 月別バーグラフ */}
      <div style={{background:"white",borderRadius:16,padding:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#888",marginBottom:12}}>📊 月別売上グラフ</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:100,marginBottom:8}}>
          {Array.from({length:12},(_,i)=>{
            const m=i+1;
            const d=monthlyData[m];
            const h=d.total>0?Math.round(d.total/maxMonthTotal*85):2;
            const isNow=(selectedYear===String(new Date().getFullYear())&&m===new Date().getMonth()+1);
            return(
              <div key={m} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <div style={{width:"100%",height:h,background:isNow?"#a07850":"#e8d5bc",borderRadius:"3px 3px 0 0",minHeight:2}}/>
                <div style={{fontSize:9,color:isNow?"#a07850":"#bbb",fontWeight:isNow?700:400}}>{m}月</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 月別リスト */}
      <div style={{background:"white",borderRadius:16,padding:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#888",marginBottom:12}}>📋 月別詳細</div>
        {Array.from({length:12},(_,i)=>{
          const m=12-i;
          const d=monthlyData[m];
          if(d.total===0&&d.count===0) return null;
          const avg=d.count>0?Math.round(d.nailTotal/d.count):0;
          const rr=d.count>0?Math.round(d.repeat/d.count*100):0;
          const sr=d.count>0?Math.round(d.shimei/d.count*100):0;
          const isNow=(selectedYear===String(new Date().getFullYear())&&m===new Date().getMonth()+1);
          const isExp=expandedMonth===m;
          const visitCounts=calcVisitCounts(d.mr);
          return(
            <div key={m} style={{borderRadius:12,marginBottom:8,border:isNow?"2px solid #a07850":"1px solid #f0e8de",overflow:"hidden"}}>
              <div onClick={()=>setExpandedMonth(isExp?null:m)}
                style={{padding:"12px 14px",cursor:"pointer",background:isNow?"#fdf8f4":"white"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:14,fontWeight:700,color:isNow?"#a07850":"#2d2016"}}>
                    {m}月{isNow?" 🟤":""}
                  </div>
                  <div style={{fontSize:18,fontWeight:700,color:"#a07850"}}>¥{d.total.toLocaleString()}</div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                  {[
                    {label:"客数",value:d.count+"名"},
                    {label:"客単価",value:"¥"+avg.toLocaleString()},
                    {label:"リピート率",value:rr+"%"},
                    {label:"初回",value:(d.count-d.repeat)+"名"},
                    {label:"指名率",value:sr+"%"},
                    {label:"店販",value:"¥"+d.hanpaiTotal.toLocaleString()},
                  ].map(({label,value})=>(
                    <div key={label} style={{background:"#fdf8f4",borderRadius:8,padding:"6px",textAlign:"center"}}>
                      <div style={{fontSize:10,color:"#999",marginBottom:2}}>{label}</div>
                      <div style={{fontSize:12,fontWeight:700,color:"#a07850"}}>{value}</div>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:11,color:"#a07850",marginTop:8,fontWeight:600}}>{isExp?"▲ 閉じる":"▼ 詳細を見る"}</div>
              </div>
              {isExp&&(
                <div style={{padding:"0 14px 14px",background:"white"}}>
                  {/* 来店回数内訳 */}
                  <div style={{background:"#fdf8f4",borderRadius:10,padding:"12px",marginBottom:8}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:8}}>🔁 来店回数内訳</div>
                    {VISIT_COUNTS.map(v=>{
                      const cnt=visitCounts[v]||0;
                      const pct=d.count>0?Math.round(cnt/d.count*100):0;
                      return(<div key={v} style={{marginBottom:8}}>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                          <span style={{color:"#888"}}>{v}</span>
                          <span style={{fontWeight:700,color:"#a07850"}}>{pct}%（{cnt}名）</span>
                        </div>
                        <Bar pct={pct} color="#a07850"/>
                      </div>);
                    })}
                  </div>
                  {/* 記録一覧 */}
                  <div style={{background:"#fdf8f4",borderRadius:10,padding:"12px"}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:8}}>記録一覧</div>
                    {d.mr.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>(
                      <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,paddingBottom:8,borderBottom:"1px solid #ede8e0"}}>
                        <div>
                          <div style={{fontSize:13,fontWeight:600}}>{(r.nailMenus||[r.nailMenu]).join("・")}</div>
                          <div style={{fontSize:11,color:"#999"}}>{r.date} · {r.visitCount||"初回"} · {r.shimei?"👆 指名":"指名なし"}</div>
                        </div>
                        <span style={{fontSize:13,fontWeight:700,color:"#a07850"}}>¥{(r.nailPrice+r.hanpaiTotal).toLocaleString()}</span>
                      </div>
                    ))}
                    {d.mr.length===0&&<div style={{textAlign:"center",color:"#ccc",fontSize:13}}>記録なし</div>}
                  </div>
                </div>
              )}
            </div>
          );
        }).filter(Boolean)}
        {yearTotal===0&&<EmptyState/>}
      </div>
    </div>
  );
}

  const [expandedStaff,setExpandedStaff]=useState(null);
  const [deleteTarget,setDeleteTarget]=useState(null);

  const isOwner=currentUser?.role==="owner";
  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  const loadRecords=async()=>{
    setLoading(true);
    try{const data=await sb("records?order=date.desc",{method:"GET"});setRecords(data.map(toRecord));}
    catch(e){showToast("データ読み込みエラー");}
    finally{setLoading(false);}
  };

  useEffect(()=>{if(currentUser)loadRecords();},[currentUser]);

  const handleDelete=(id)=>{setDeleteTarget(id);};
  const confirmDelete=async()=>{
    try{
      await sb(`records?id=eq.${deleteTarget}`,{method:"DELETE"});
      setRecords(prev=>prev.filter(p=>p.id!==deleteTarget));
      setDeleteTarget(null);showToast("削除しました");
    }catch(e){showToast("削除に失敗しました");}
  };

  const toggleMenu=(menu)=>{
    const current=form.nailMenus||[];
    if(current.includes(menu)){if(current.length===1)return;setForm({...form,nailMenus:current.filter(m=>m!==menu)});}
    else{setForm({...form,nailMenus:[...current,menu]});}
  };

  const handleSubmit=async()=>{
    if(!form.nailPrice){showToast("施術金額を入力してください");return;}
    const staffName=isOwner?form.staff:currentUser.name;
    if(!staffName){showToast("スタッフを選択してください");return;}
    const hanpaiParsed={};
    HANPAI_MENUS.forEach(m=>{hanpaiParsed[m]=Number(form.hanpai[m])||0;});
    const hanpaiTotal=Object.values(hanpaiParsed).reduce((a,b)=>a+b,0);
    const menusStr=(form.nailMenus||["ハンド"]).join("・");
    const payload={
      date:form.date,staff:staffName,nail_menu:menusStr,nail_price:Number(form.nailPrice),
      is_repeat:isRepeatFromVisit(form.visitCount),visit_count:form.visitCount,shimei:form.shimei,
      payment:form.payment,hanpai_koyo:hanpaiParsed["KOYO物販"],hanpai_gamo:hanpaiParsed["ガモウ物販"],
      hanpai_nail:hanpaiParsed["ネイル物販"],hanpai_protein:hanpaiParsed["プロテイン"],
      hanpai_total:hanpaiTotal,note:form.note,
    };
    try{
      const [saved]=await sb("records",{method:"POST",body:JSON.stringify(payload)});
      setRecords(prev=>[toRecord(saved),...prev]);
      setForm({...initialForm,date:form.date,staff:isOwner?form.staff:currentUser.name});
      showToast("登録しました！");
    }catch(e){showToast("登録に失敗しました");}
  };

  const canEdit=(r)=>{
    if(isOwner)return true;
    if(r.staff!==currentUser.name)return false;
    return r.date===TODAY;
  };

  const stats=useMemo(()=>{
    const visibleRecords=isOwner?records:records.filter(r=>r.staff===currentUser?.name);
    const byDay={},byMonth={},byYear={};
    records.forEach((r)=>{
      const total=r.nailPrice+r.hanpaiTotal;
      byDay[r.date]=(byDay[r.date]||0)+total;
      byMonth[r.date.slice(0,7)]=(byMonth[r.date.slice(0,7)]||0)+total;
      byYear[r.date.slice(0,4)]=(byYear[r.date.slice(0,4)]||0)+total;
    });
    const monthRecords=visibleRecords.filter(r=>r.date.startsWith(selectedMonth));
    const allMonthRecords=records.filter(r=>r.date.startsWith(selectedMonth));
    const yearRecords=visibleRecords.filter(r=>r.date.startsWith(selectedYear));
    return{byDay,byMonth,byYear,byStaff:calcStats(records),monthRecords,allMonthRecords,yearRecords,visibleRecords};
  },[records,selectedMonth,selectedYear,currentUser,isOwner]);

  if(!currentUser)return<LoginScreen onLogin={(user)=>{setCurrentUser(user);setForm({...initialForm,staff:user.role==="staff"?user.name:""});}}/>;

  const STAFF_NAMES=STAFF_LIST.map(s=>s.name);
  // ★ スタッフに「年間」タブを追加
  const tabs=isOwner
    ?[{key:"input",label:"入力"},{key:"daily",label:"日別"},{key:"monthly",label:"月別"},{key:"yearly",label:"年間"},{key:"staff",label:"スタッフ"},{key:"analysis",label:"📊分析"}]
    :[{key:"input",label:"入力"},{key:"monthly",label:"月別"},{key:"staff_annual",label:"年間"}];

  return(
    <div style={{fontFamily:"sans-serif",background:"#fdf8f4",minHeight:"100vh",color:"#2d2016",overflowX:"hidden",width:"100%",maxWidth:"100vw",boxSizing:"border-box"}}>
      <div style={{background:"linear-gradient(135deg,#c8a882,#a07850)",padding:"16px 16px 12px",color:"white",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div>
          <div style={{fontSize:11,letterSpacing:3,opacity:0.8,marginBottom:2}}>燈乃工房・本店</div>
          <div style={{fontSize:20,fontWeight:700}}>売上管理</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:12,opacity:0.9}}>{currentUser.name} {isOwner?"👑":""}</div>
          <button onClick={()=>{setCurrentUser(null);setRecords([]);setView("input");}}
            style={{background:"rgba(255,255,255,0.2)",border:"none",color:"white",fontSize:11,padding:"4px 10px",borderRadius:8,cursor:"pointer",marginTop:4}}>
            ログアウト
          </button>
        </div>
      </div>

      <div style={{display:"flex",background:"white",borderBottom:"1px solid #e8ddd0",overflowX:"auto"}}>
        {tabs.map(tab=>(
          <button key={tab.key} onClick={()=>setView(tab.key)}
            style={{flex:1,minWidth:60,padding:"12px 8px",border:"none",background:"none",fontSize:13,
              fontWeight:view===tab.key?700:400,color:view===tab.key?"#a07850":"#888",
              borderBottom:view===tab.key?"2px solid #a07850":"2px solid transparent",cursor:"pointer",whiteSpace:"nowrap"}}>
            {tab.label}
          </button>
        ))}
      </div>

      {loading&&<div style={{textAlign:"center",padding:20,color:"#a07850",fontSize:13}}>読み込み中...</div>}

      <div style={{padding:"16px",maxWidth:480,margin:"0 auto"}}>

        {/* 入力 */}
        {view==="input"&&(
          <div>
            <div style={{background:"white",borderRadius:16,padding:20,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
              <div style={{fontSize:15,fontWeight:700,marginBottom:16,color:"#a07850"}}>新規登録</div>
              <FR label="日付">
                <div style={{border:"1px solid #e8ddd0",borderRadius:10,background:"#fdf8f4",overflow:"hidden",display:"flex",alignItems:"center"}}>
                  <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}
                    style={{flex:1,padding:"10px 12px",border:"none",background:"transparent",fontSize:14,outline:"none",minWidth:0}}/>
                </div>
              </FR>
              {isOwner?(
                <FR label="担当スタッフ">
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {STAFF_NAMES.map(s=>(
                      <button key={s} onClick={()=>setForm({...form,staff:s})}
                        style={{...cS,background:form.staff===s?"#a07850":"#f0e8de",color:form.staff===s?"white":"#a07850"}}>{s}</button>
                    ))}
                  </div>
                </FR>
              ):(
                <div style={{background:"#f0e8de",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:14,fontWeight:600,color:"#a07850"}}>
                  担当：{currentUser.name}
                </div>
              )}
              <div style={{background:"#fdf0e8",borderRadius:12,padding:14,marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:700,color:"#a07850",marginBottom:12}}>💅 施術</div>
                <FR label="メニュー（複数選択OK）">
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {NAIL_MENUS.map(m=>{
                      const selected=(form.nailMenus||[]).includes(m);
                      return(
                        <button key={m} onClick={()=>toggleMenu(m)}
                          style={{...cS,background:selected?"#a07850":"#f0e8de",color:selected?"white":"#a07850",
                            border:selected?"2px solid #a07850":"2px solid transparent",position:"relative"}}>
                          {m}
                          {selected&&<span style={{position:"absolute",top:-4,right:-4,background:"white",color:"#a07850",borderRadius:"50%",width:14,height:14,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,border:"1px solid #a07850"}}>✓</span>}
                        </button>
                      );
                    })}
                  </div>
                  {(form.nailMenus||[]).length>1&&(
                    <div style={{marginTop:6,fontSize:11,color:"#a07850",fontWeight:600}}>
                      選択中：{(form.nailMenus||[]).join(" ＋ ")}
                    </div>
                  )}
                </FR>
                <FR label="施術金額（円）">
                  <input type="number" placeholder="例：8000" value={form.nailPrice} onChange={e=>setForm({...form,nailPrice:e.target.value})} style={iS}/>
                </FR>
                <FR label="来店回数">
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {VISIT_COUNTS.map(v=>(
                      <button key={v} onClick={()=>setForm({...form,visitCount:v})}
                        style={{...cS,background:form.visitCount===v?"#a07850":"#f0e8de",color:form.visitCount===v?"white":"#a07850",fontSize:12}}>{v}</button>
                    ))}
                  </div>
                </FR>
                <FR label="指名">
                  <div style={{display:"flex",gap:8}}>
                    {["指名なし","指名あり"].map((l,i)=>(
                      <button key={l} onClick={()=>setForm({...form,shimei:i===1})}
                        style={{...cS,background:form.shimei===(i===1)?"#7a5c8a":"#efe8f5",color:form.shimei===(i===1)?"white":"#7a5c8a"}}>{l}</button>
                    ))}
                  </div>
                </FR>
              </div>
              <div style={{background:"#fef4ec",borderRadius:12,padding:14,marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:700,color:"#c87840",marginBottom:12}}>🛍 物販</div>
                {HANPAI_MENUS.map(m=>(
                  <FR key={m} label={m}>
                    <input type="number" placeholder="0" value={form.hanpai[m]}
                      onChange={e=>setForm({...form,hanpai:{...form.hanpai,[m]:e.target.value}})} style={iS}/>
                  </FR>
                ))}
              </div>
              <FR label="メモ"><input placeholder="任意" value={form.note} onChange={e=>setForm({...form,note:e.target.value})} style={iS}/></FR>
              <FR label="決済方法">
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {PAYMENTS.map(p=>(
                    <button key={p} onClick={()=>setForm({...form,payment:p})}
                      style={{...cS,background:form.payment===p?"#4a7a6a":"#e8f0ed",color:form.payment===p?"white":"#4a7a6a",fontSize:12}}>{p}</button>
                  ))}
                </div>
              </FR>
              <button onClick={handleSubmit}
                style={{width:"100%",padding:14,background:"linear-gradient(135deg,#c8a882,#a07850)",color:"white",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}}>
                登録する
              </button>
            </div>
            {(()=>{
              const todayRec=stats.visibleRecords.filter(r=>r.date===form.date);
              if(todayRec.length===0)return null;
              return(
                <div style={{marginTop:16}}>
                  <div style={{fontSize:13,color:"#999",marginBottom:8}}>本日の記録</div>
                  {todayRec.map(r=>(
                    <div key={r.id} style={{background:"white",borderRadius:12,padding:"12px 16px",marginBottom:8,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <div style={{fontSize:14,fontWeight:600}}>{r.staff} · {(r.nailMenus||[r.nailMenu]).join("・")}</div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:15,fontWeight:700,color:"#a07850"}}>¥{(r.nailPrice+r.hanpaiTotal).toLocaleString()}</span>
                          {canEdit(r)&&<DelBtn onClick={()=>handleDelete(r.id)}/>}
                        </div>
                      </div>
                      <div style={{fontSize:12,color:"#999"}}>
                        施術¥{r.nailPrice.toLocaleString()} · {r.visitCount||"初回"} · {r.shimei?"👆 指名あり":"指名なし"} · {r.payment}
                        {r.hanpaiTotal>0&&" · 店販¥"+r.hanpaiTotal.toLocaleString()}
                      </div>
                    </div>
                  ))}
                  <div style={{textAlign:"right",fontSize:14,fontWeight:700,color:"#a07850",marginTop:4}}>
                    合計 ¥{todayRec.reduce((s,r)=>s+r.nailPrice+r.hanpaiTotal,0).toLocaleString()}
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        {/* ★ スタッフ用 個人年間タブ */}
        {view==="staff_annual"&&!isOwner&&(
          <StaffAnnualView records={records} currentUser={currentUser}/>
        )}

        {/* 日別（オーナーのみ） */}
        {view==="daily"&&isOwner&&(
          <div>
            <div style={{fontSize:13,color:"#999",marginBottom:12}}>日別売上</div>
            {Object.entries(stats.byDay).sort((a,b)=>b[0].localeCompare(a[0])).map(([day,total])=>{
              const dr=records.filter(r=>r.date===day);
              const nailTotal=dr.reduce((s,r)=>s+r.nailPrice,0);
              const hanpaiTotal=dr.reduce((s,r)=>s+r.hanpaiTotal,0);
              const repeatRate=dr.length>0?Math.round((dr.filter(r=>r.isRepeat).length/dr.length)*100):0;
              const shimeiRate=dr.length>0?Math.round((dr.filter(r=>r.shimei).length/dr.length)*100):0;
              const avg=dr.length>0?Math.round(nailTotal/dr.length):0;
              const isExp=expandedStaff===day;
              const visitCounts=calcVisitCounts(dr);
              return(
                <div key={day} style={{background:"white",borderRadius:12,padding:"14px 16px",marginBottom:10,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{fontSize:14,fontWeight:700}}>{day}</div>
                    <div style={{fontSize:16,fontWeight:700,color:"#a07850"}}>¥{total.toLocaleString()}</div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                    {[{label:"客数",value:dr.length+"名"},{label:"客単価",value:"¥"+avg.toLocaleString()},{label:"リピート率",value:repeatRate+"%"},
                      {label:"初回",value:visitCounts["初回"]+"名"},{label:"指名率",value:shimeiRate+"%"},{label:"店販",value:"¥"+hanpaiTotal.toLocaleString()}]
                      .map(({label,value})=>(
                        <div key={label} style={{background:"#fdf8f4",borderRadius:8,padding:"8px 6px",textAlign:"center"}}>
                          <div style={{fontSize:10,color:"#999",marginBottom:2}}>{label}</div>
                          <div style={{fontSize:13,fontWeight:700,color:"#a07850"}}>{value}</div>
                        </div>
                      ))}
                  </div>
                  <button onClick={()=>setExpandedStaff(isExp?null:day)}
                    style={{background:"none",border:"none",color:"#a07850",fontSize:12,cursor:"pointer",padding:0,fontWeight:600}}>
                    {isExp?"▲ 詳細を閉じる":"▼ 詳細を見る"}
                  </button>
                  {isExp&&(
                    <div style={{marginTop:10}}>
                      <div style={{background:"#fdf8f4",borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:8}}>来店回数内訳</div>
                        {VISIT_COUNTS.map(v=>{const cnt=visitCounts[v]||0;const pct=dr.length>0?Math.round((cnt/dr.length)*100):0;return(<div key={v} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{color:"#888"}}>{v}</span><span style={{fontWeight:700,color:"#a07850"}}>{pct}%（{cnt}名）</span></div><Bar pct={pct} color="#a07850"/></div>);})}
                      </div>
                      <div style={{background:"#fdf8f4",borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:8}}>記録一覧</div>
                        {dr.map(r=>(<div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,paddingBottom:8,borderBottom:"1px solid #ede8e0"}}><div><div style={{fontSize:13,fontWeight:600}}>{r.staff} · {(r.nailMenus||[r.nailMenu]).join("・")}</div><div style={{fontSize:11,color:"#999"}}>{r.visitCount||"初回"} · {r.shimei?"👆 指名":"指名なし"} · {r.payment}</div></div><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:13,fontWeight:700,color:"#a07850"}}>¥{(r.nailPrice+r.hanpaiTotal).toLocaleString()}</span>{canEdit(r)&&<DelBtn onClick={()=>handleDelete(r.id)}/>}</div></div>))}
                      </div>
                      <div style={{background:"#fdf8f4",borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:8}}>💳 決済比率</div>
                        {PAYMENTS.map(p=>{const cnt=dr.filter(r=>r.payment===p).length;const pct=dr.length>0?Math.round((cnt/dr.length)*100):0;return(<div key={p} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{color:"#888"}}>{p}</span><span style={{fontWeight:700,color:"#4a7a6a"}}>{pct}%（{cnt}件）</span></div><Bar pct={pct} color="#4a7a6a"/></div>);})}
                      </div>
                      <div style={{background:"#fdf8f4",borderRadius:10,padding:"12px 14px"}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:8}}>スタッフ別</div>
                        {STAFF_NAMES.map(s=>{const sr=dr.filter(r=>r.staff===s);if(sr.length===0)return null;const st=sr.reduce((sum,r)=>sum+r.nailPrice+r.hanpaiTotal,0);return(<div key={s} style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#888",marginBottom:6}}><span>{s}（{sr.length}名）</span><span style={{fontWeight:600,color:"#a07850"}}>¥{st.toLocaleString()}</span></div>);})}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
            {Object.keys(stats.byDay).length===0&&<EmptyState/>}
          </div>
        )}

        {/* 月別 */}
        {view==="monthly"&&(
          <div>
            <div style={{border:"1px solid #e8ddd0",borderRadius:10,background:"#fdf8f4",overflow:"hidden",display:"flex",alignItems:"center",marginBottom:16}}>
              <input type="month" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}
                style={{flex:1,padding:"10px 12px",border:"none",background:"transparent",fontSize:14,outline:"none",minWidth:0}}/>
            </div>
            {!isOwner&&(()=>{
              const mr=stats.monthRecords;
              const allMr=stats.allMonthRecords;
              const myNailTotal=mr.reduce((s,r)=>s+r.nailPrice,0);
              const myTotal=mr.reduce((s,r)=>s+r.nailPrice+r.hanpaiTotal,0);
              const myRepeatRate=mr.length>0?Math.round((mr.filter(r=>r.isRepeat).length/mr.length)*100):0;
              const myShimeiRate=mr.length>0?Math.round((mr.filter(r=>r.shimei).length/mr.length)*100):0;
              const myAvg=mr.length>0?Math.round(myNailTotal/mr.length):0;
              const allTotal=allMr.reduce((s,r)=>s+r.nailPrice+r.hanpaiTotal,0);
              const allRepeatRate=allMr.length>0?Math.round((allMr.filter(r=>r.isRepeat).length/allMr.length)*100):0;
              const visitCounts=calcVisitCounts(mr);
              return(<>
                <div style={{fontSize:13,fontWeight:700,color:"#a07850",marginBottom:8}}>自分の数字</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                  {[{label:"売上",value:"¥"+myTotal.toLocaleString()},{label:"客数",value:mr.length+"名"},
                    {label:"客単価",value:"¥"+myAvg.toLocaleString()},{label:"リピート率",value:myRepeatRate+"%"},
                    {label:"指名率",value:myShimeiRate+"%"},
                  ].map(({label,value})=><StatCard key={label} label={label} value={value}/>)}
                </div>
                {/* 来店回数内訳 */}
                {mr.length>0&&(
                  <div style={{background:"white",borderRadius:12,padding:"14px 16px",marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
                    <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>🔁 来店回数内訳</div>
                    {VISIT_COUNTS.map(v=>{const cnt=visitCounts[v]||0;const pct=mr.length>0?Math.round((cnt/mr.length)*100):0;return(<div key={v} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span style={{color:"#888"}}>{v}</span><span style={{fontWeight:700,color:"#a07850"}}>{pct}%（{cnt}名）</span></div><Bar pct={pct} color="#a07850"/></div>);})}
                  </div>
                )}
                <div style={{fontSize:13,fontWeight:700,color:"#a07850",marginBottom:8}}>店全体</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                  {[{label:"店全体売上",value:"¥"+allTotal.toLocaleString()},{label:"店全体客数",value:allMr.length+"名"},{label:"店全体リピート率",value:allRepeatRate+"%"}]
                    .map(({label,value})=><StatCard key={label} label={label} value={value}/>)}
                </div>
                {mr.map(r=>(
                  <div key={r.id} style={{background:"white",borderRadius:12,padding:"12px 16px",marginBottom:8,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <div style={{fontSize:14,fontWeight:600}}>{(r.nailMenus||[r.nailMenu]).join("・")}</div>
                      <div style={{fontSize:14,fontWeight:700,color:"#a07850"}}>¥{(r.nailPrice+r.hanpaiTotal).toLocaleString()}</div>
                    </div>
                    <div style={{fontSize:12,color:"#999"}}>{r.date} · {r.visitCount||"初回"} · {r.shimei?"👆 指名あり":"指名なし"}</div>
                  </div>
                ))}
                {mr.length===0&&<EmptyState/>}
              </>);
            })()}
            {isOwner&&(()=>{
              const mr=stats.monthRecords;
              const nailTotal=mr.reduce((s,r)=>s+r.nailPrice,0);
              const hanpaiTotal=mr.reduce((s,r)=>s+r.hanpaiTotal,0);
              const total=nailTotal+hanpaiTotal;
              const repeatRate=mr.length>0?Math.round((mr.filter(r=>r.isRepeat).length/mr.length)*100):0;
              const shimeiRate=mr.length>0?Math.round((mr.filter(r=>r.shimei).length/mr.length)*100):0;
              const avg=mr.length>0?Math.round(nailTotal/mr.length):0;
              const visitCounts=calcVisitCounts(mr);
              const menuCounts=calcMenuCounts(mr);
              return(<>
                <div style={{display:"flex",gap:8,marginBottom:16}}>
                  <button onClick={()=>exportCSV(selectedMonth,mr,stats.byStaff,isOwner)}
                    style={{flex:1,padding:"12px",background:"#4a7a6a",color:"white",border:"none",borderRadius:12,fontSize:13,fontWeight:700,cursor:"pointer"}}>
                    📊 CSV出力
                  </button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                  {[{label:"総売上",value:"¥"+total.toLocaleString()},{label:"客数",value:mr.length+"名"},
                    {label:"施術売上",value:"¥"+nailTotal.toLocaleString()},{label:"客単価",value:"¥"+avg.toLocaleString()},
                    {label:"店販売上",value:"¥"+hanpaiTotal.toLocaleString()},{label:"リピート率",value:repeatRate+"%"},
                    {label:"初回",value:visitCounts["初回"]+"名"},{label:"指名率",value:shimeiRate+"%"},
                  ].map(({label,value})=><StatCard key={label} label={label} value={value}/>)}
                </div>
                <div style={{background:"white",borderRadius:12,padding:"14px 16px",marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>🔁 来店回数内訳</div>
                  {VISIT_COUNTS.map(v=>{const cnt=visitCounts[v]||0;const pct=mr.length>0?Math.round((cnt/mr.length)*100):0;return(<div key={v} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span style={{color:"#888"}}>{v}</span><span style={{fontWeight:700,color:"#a07850"}}>{pct}%（{cnt}名）</span></div><Bar pct={pct} color="#a07850"/></div>);})}
                </div>
                <div style={{background:"white",borderRadius:12,padding:"14px 16px",marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>💅 メニュー別件数</div>
                  {NAIL_MENUS.map(m=>{const cnt=menuCounts[m]||0;const pct=mr.length>0?Math.round((cnt/mr.length)*100):0;return(<div key={m} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span style={{color:"#888"}}>{m}</span><span style={{fontWeight:700,color:"#c87840"}}>{pct}%（{cnt}件）</span></div><Bar pct={pct} color="#c87840"/></div>);})}
                </div>
                <div style={{background:"white",borderRadius:12,padding:"14px 16px",marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>💳 決済比率</div>
                  {PAYMENTS.map(p=>{const cnt=mr.filter(r=>r.payment===p).length;const pct=mr.length>0?Math.round((cnt/mr.length)*100):0;return(<div key={p} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span style={{color:"#888"}}>{p}</span><span style={{fontWeight:700,color:"#4a7a6a"}}>{pct}%（{cnt}件）</span></div><Bar pct={pct} color="#4a7a6a"/></div>);})}
                </div>
                <div style={{background:"white",borderRadius:12,padding:"14px 16px",marginBottom:16,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>店販内訳</div>
                  {HANPAI_MENUS.map(m=>{const t=mr.reduce((s,r)=>s+(r.hanpai[m]||0),0);return(<div key={m} style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#888",marginBottom:6}}><span>{m}</span><span style={{fontWeight:600,color:"#c87840"}}>¥{t.toLocaleString()}</span></div>);})}
                </div>
                {mr.map(r=>(
                  <div key={r.id} style={{background:"white",borderRadius:12,padding:"12px 16px",marginBottom:8,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <div style={{fontSize:14,fontWeight:600}}>{r.staff} · {(r.nailMenus||[r.nailMenu]).join("・")}</div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:14,fontWeight:700,color:"#a07850"}}>¥{(r.nailPrice+r.hanpaiTotal).toLocaleString()}</span>
                        <DelBtn onClick={()=>handleDelete(r.id)}/>
                      </div>
                    </div>
                    <div style={{fontSize:12,color:"#999"}}>
                      {r.date} · {r.visitCount||"初回"} · {r.shimei?"👆 指名あり":"指名なし"} · {r.payment}
                      {r.hanpaiTotal>0&&" · 店販¥"+r.hanpaiTotal.toLocaleString()}
                    </div>
                  </div>
                ))}
                {mr.length===0&&<EmptyState/>}
              </>);
            })()}
          </div>
        )}

        {/* 年間（オーナー） */}
        {view==="yearly"&&isOwner&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {["2024","2025","2026"].map(y=>(
                <button key={y} onClick={()=>setSelectedYear(y)}
                  style={{...cS,background:selectedYear===y?"#a07850":"#f0e8de",color:selectedYear===y?"white":"#a07850"}}>{y}年</button>
              ))}
            </div>
            <div style={{background:"white",borderRadius:16,padding:20,marginBottom:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",textAlign:"center"}}>
              <div style={{fontSize:12,color:"#999",marginBottom:4}}>{selectedYear}年 年間売上</div>
              <div style={{fontSize:32,fontWeight:700,color:"#a07850"}}>¥{(stats.byYear[selectedYear]||0).toLocaleString()}</div>
              <div style={{fontSize:13,color:"#999",marginTop:4}}>{stats.yearRecords.length}件</div>
            </div>
            {Object.entries(stats.byMonth).filter(([m])=>m.startsWith(selectedYear)).sort().map(([month,total])=>(
              <div key={month} style={{background:"white",borderRadius:12,padding:"14px 16px",marginBottom:8,display:"flex",justifyContent:"space-between",boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
                <div style={{fontSize:14,fontWeight:600}}>{month.slice(5)}月</div>
                <div style={{fontSize:15,fontWeight:700,color:"#a07850"}}>¥{total.toLocaleString()}</div>
              </div>
            ))}
            {stats.yearRecords.length===0&&<EmptyState/>}
          </div>
        )}

        {/* 分析タブ（オーナーのみ） */}
        {view==="analysis"&&isOwner&&(()=>{
          const mr=stats.monthRecords;
          const visitCounts=calcVisitCounts(mr);
          const menuCounts=calcMenuCounts(mr);
          const total=mr.length;
          const repeat=mr.filter(r=>r.isRepeat).length;
          const repeatRate=total>0?Math.round(repeat/total*100):0;
          const newCount=total-repeat;
          const VISIT_COLORS=["#C17C5A","#7FADA0","#8B7EC8","#5E9E8C"];

          // 6ヶ月トレンド
          const trendMonths=[];
          for(let i=5;i>=0;i--){
            let [y,m]=selectedMonth.split("-").map(Number);
            m-=i; while(m<=0){m+=12;y--;}
            const key=`${y}-${String(m).padStart(2,"0")}`;
            const mr2=records.filter(r=>r.date.startsWith(key));
            const rep=mr2.filter(r=>r.isRepeat).length;
            const rr=mr2.length>0?Math.round(rep/mr2.length*100):0;
            trendMonths.push({label:`${m}月`,total:mr2.length,repeat:rep,rr,
              visits:calcVisitCounts(mr2)});
          }
          const maxTotal2=Math.max(1,...trendMonths.map(t=>t.total));

          return(
            <div>
              {/* 月選択 */}
              <div style={{border:"1px solid #e8ddd0",borderRadius:10,background:"#fdf8f4",overflow:"hidden",display:"flex",alignItems:"center",marginBottom:16}}>
                <input type="month" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}
                  style={{flex:1,padding:"10px 12px",border:"none",background:"transparent",fontSize:14,outline:"none",minWidth:0}}/>
              </div>

              {/* リピート率ヒーロー */}
              <div style={{background:"linear-gradient(135deg,#c8a882,#a07850)",borderRadius:20,padding:20,color:"white",marginBottom:16,boxShadow:"0 4px 20px rgba(160,120,80,0.3)"}}>
                <div style={{fontSize:11,opacity:0.75,marginBottom:4}}>{selectedMonth.replace("-","年")}月 リピート率</div>
                <div style={{fontSize:44,fontWeight:700,lineHeight:1,marginBottom:12}}>{repeatRate}<span style={{fontSize:24}}>%</span></div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  {[{label:"総客数",value:total+"名"},{label:"リピート",value:repeat+"名"},{label:"初回",value:newCount+"名"}]
                    .map(({label,value})=>(
                      <div key={label} style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px",textAlign:"center"}}>
                        <div style={{fontSize:10,opacity:0.75,marginBottom:3}}>{label}</div>
                        <div style={{fontWeight:700,fontSize:15}}>{value}</div>
                      </div>
                    ))}
                </div>
              </div>

              {/* 来店回数内訳 */}
              <div style={{background:"white",borderRadius:16,padding:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:700,color:"#888",marginBottom:12}}>🔁 来店回数別内訳</div>
                {VISIT_COUNTS.map((v,i)=>{
                  const cnt=visitCounts[v]||0;
                  const pct=total>0?Math.round(cnt/total*100):0;
                  return(<div key={v} style={{marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                      <span style={{color:"#666",fontWeight:600}}>{v}</span>
                      <span style={{fontWeight:700,color:VISIT_COLORS[i]}}>{pct}%（{cnt}名）</span>
                    </div>
                    <div style={{background:"#f0e8de",borderRadius:99,height:10,overflow:"hidden"}}>
                      <div style={{width:pct+"%",height:"100%",background:VISIT_COLORS[i],borderRadius:99,transition:"width 0.5s"}}/>
                    </div>
                  </div>);
                })}
              </div>

              {/* 6ヶ月トレンド */}
              <div style={{background:"white",borderRadius:16,padding:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:700,color:"#888",marginBottom:12}}>📈 6ヶ月 来店回数トレンド</div>
                <div style={{display:"flex",alignItems:"flex-end",gap:4,height:110,marginBottom:8}}>
                  {trendMonths.map((t,i)=>{
                    const isCurrent=i===5;
                    return(
                      <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                        <div style={{fontSize:9,fontWeight:700,color:isCurrent?"#a07850":"#bbb",marginBottom:2}}>{t.rr}%</div>
                        <div style={{width:"100%",display:"flex",flexDirection:"column-reverse",borderRadius:"3px 3px 0 0",overflow:"hidden"}}>
                          {VISIT_COUNTS.map((v,j)=>{
                            const cnt=t.visits[v]||0;
                            const h=t.total>0?Math.round(cnt/maxTotal2*80):0;
                            return <div key={v} style={{height:h,background:VISIT_COLORS[j],minHeight:cnt>0?2:0}}/>;
                          })}
                        </div>
                        <div style={{fontSize:9,color:isCurrent?"#a07850":"#bbb",fontWeight:isCurrent?700:400}}>{t.label}</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
                  {VISIT_COUNTS.map((v,i)=>(
                    <div key={v} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#888"}}>
                      <div style={{width:8,height:8,borderRadius:2,background:VISIT_COLORS[i]}}/>
                      {v}
                    </div>
                  ))}
                </div>
              </div>

              {/* メニュー割合 */}
              <div style={{background:"white",borderRadius:16,padding:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:700,color:"#888",marginBottom:12}}>💅 メニュー別件数</div>
                {NAIL_MENUS.map((m,i)=>{
                  const cnt=menuCounts[m]||0;
                  const pct=total>0?Math.round(cnt/total*100):0;
                  const color=["#C17C5A","#D4976A","#7FADA0","#8B7EC8"][i];
                  return(<div key={m} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
                      <span style={{color:"#888"}}>{m}</span>
                      <span style={{fontWeight:700,color}}>{pct}%（{cnt}件）</span>
                    </div>
                    <div style={{background:"#f0e8de",borderRadius:99,height:8,overflow:"hidden"}}>
                      <div style={{width:pct+"%",height:"100%",background:color,borderRadius:99}}/>
                    </div>
                  </div>);
                })}
              </div>

              {/* スタッフ別リピート率 */}
              <div style={{background:"white",borderRadius:16,padding:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:700,color:"#888",marginBottom:12}}>👩 スタッフ別リピート率</div>
                {STAFF_NAMES.map((s,i)=>{
                  const sr=mr.filter(r=>r.staff===s);
                  if(sr.length===0)return(<div key={s} style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#ccc",marginBottom:10,paddingBottom:10,borderBottom:"1px solid #f5f0eb"}}><span>{s}</span><span>記録なし</span></div>);
                  const srep=sr.filter(r=>r.isRepeat).length;
                  const srr=Math.round(srep/sr.length*100);
                  const svc=calcVisitCounts(sr);
                  const color=["#C17C5A","#7FADA0","#8B7EC8"][i%3];
                  return(
                    <div key={s} style={{marginBottom:14,paddingBottom:14,borderBottom:"1px solid #f5f0eb"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <div style={{fontSize:13,fontWeight:700}}>{s}</div>
                        <div style={{fontSize:18,fontWeight:700,color}}>{srr}%</div>
                      </div>
                      <div style={{background:"#f0e8de",borderRadius:99,height:8,overflow:"hidden",marginBottom:6}}>
                        <div style={{width:srr+"%",height:"100%",background:color,borderRadius:99}}/>
                      </div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {VISIT_COUNTS.map((v,j)=>(
                          <div key={v} style={{fontSize:10,color:"#999",background:"#fdf8f4",borderRadius:99,padding:"2px 8px"}}>
                            {v}：{svc[v]||0}名
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {/* スタッフ別（オーナー） */}
        {view==="staff"&&isOwner&&(
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <div style={{fontSize:13,color:"#999",flexShrink:0}}>月を選択：</div>
              <div style={{border:"1px solid #e8ddd0",borderRadius:10,background:"#fdf8f4",overflow:"hidden",flex:1}}>
                <input type="month" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}
                  style={{width:"100%",padding:"8px 12px",border:"none",background:"transparent",fontSize:14,outline:"none"}}/>
              </div>
            </div>
            {STAFF_NAMES.map(s=>{
              const monthStaffRecords=records.filter(r=>r.staff===s&&r.date.startsWith(selectedMonth));
              const d=calcStats(monthStaffRecords)[s];
              const isExp=expandedStaff===s;
              if(!d)return(<div key={s} style={{background:"white",borderRadius:12,padding:16,marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}><div style={{fontSize:15,fontWeight:700,marginBottom:4}}>{s}</div><div style={{fontSize:13,color:"#ccc"}}>{selectedMonth.replace("-","年")}月 の記録なし</div></div>);
              const repeatRate=d.count>0?Math.round((d.repeat/d.count)*100):0;
              const shimeiRate=d.count>0?Math.round((d.shimei/d.count)*100):0;
              const avg=d.count>0?Math.round(d.nailTotal/d.count):0;
              return(
                <div key={s} style={{background:"white",borderRadius:16,padding:20,marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:14}}>
                    <div style={{fontSize:16,fontWeight:700,color:"#2d2016"}}>{s}</div>
                    <div style={{fontSize:11,color:"#a07850",fontWeight:600}}>{selectedMonth.replace("-","年")}月</div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                    {[{label:"売上",value:"¥"+d.total.toLocaleString()},{label:"客数",value:d.count+"名"},
                      {label:"施術売上",value:"¥"+d.nailTotal.toLocaleString()},{label:"客単価",value:"¥"+avg.toLocaleString()},
                      {label:"店販売上",value:"¥"+d.hanpaiTotal.toLocaleString()},{label:"リピート率",value:repeatRate+"%"},
                      {label:"初回",value:(d.visitCounts["初回"]||0)+"名"},{label:"指名率",value:shimeiRate+"%"},
                    ].map(({label,value})=>(<div key={label} style={{background:"#fdf8f4",borderRadius:12,padding:"12px 14px",textAlign:"center"}}><div style={{fontSize:11,color:"#999",marginBottom:4}}>{label}</div><div style={{fontSize:16,fontWeight:700,color:"#a07850"}}>{value}</div></div>))}
                  </div>
                  <button onClick={()=>setExpandedStaff(isExp?null:s)}
                    style={{background:"none",border:"none",color:"#a07850",fontSize:12,cursor:"pointer",padding:"0 0 10px",fontWeight:600}}>
                    {isExp?"▲ 詳細を閉じる":"▼ 詳細を見る"}
                  </button>
                  {isExp&&(
                    <div style={{marginTop:8}}>
                      <div style={{background:"#fdf8f4",borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:8}}>来店回数内訳</div>
                        {VISIT_COUNTS.map(v=>{const cnt=d.visitCounts[v]||0;const pct=d.count>0?Math.round((cnt/d.count)*100):0;return(<div key={v} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{color:"#888"}}>{v}</span><span style={{fontWeight:700,color:"#a07850"}}>{pct}%（{cnt}名）</span></div><Bar pct={pct} color="#a07850"/></div>);})}
                      </div>
                      <div style={{background:"#fdf8f4",borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:8}}>💅 メニュー別</div>
                        {NAIL_MENUS.map(m=>{const cnt=d.menuCounts[m]||0;const pct=d.count>0?Math.round((cnt/d.count)*100):0;return(<div key={m} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{color:"#888"}}>{m}</span><span style={{fontWeight:700,color:"#c87840"}}>{pct}%（{cnt}件）</span></div><Bar pct={pct} color="#c87840"/></div>);})}
                      </div>
                      <div style={{background:"#fdf8f4",borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:8}}>店販内訳</div>
                        {HANPAI_MENUS.map(m=>(<div key={m} style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#888",marginBottom:6}}><span>{m}</span><span style={{fontWeight:600,color:"#c87840"}}>¥{(d.hanpai[m]||0).toLocaleString()}</span></div>))}
                      </div>
                      <div style={{background:"#fdf8f4",borderRadius:10,padding:"12px 14px"}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:8}}>💳 決済比率</div>
                        {PAYMENTS.map(p=>{const cnt=d.payment[p]||0;const pct=d.count>0?Math.round((cnt/d.count)*100):0;return(<div key={p} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{color:"#888"}}>{p}</span><span style={{fontWeight:700,color:"#4a7a6a"}}>{pct}%（{cnt}件）</span></div><Bar pct={pct} color="#4a7a6a"/></div>);})}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {deleteTarget&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"white",borderRadius:16,padding:24,width:"100%",maxWidth:320,textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:12}}>🗑️</div>
            <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>この記録を削除しますか？</div>
            <div style={{fontSize:13,color:"#999",marginBottom:24}}>削除すると元に戻せません</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setDeleteTarget(null)}
                style={{flex:1,padding:12,background:"#f0e8de",border:"none",borderRadius:12,fontSize:14,fontWeight:700,color:"#a07850",cursor:"pointer"}}>
                キャンセル
              </button>
              <button onClick={confirmDelete}
                style={{flex:1,padding:12,background:"#e05050",border:"none",borderRadius:12,fontSize:14,fontWeight:700,color:"white",cursor:"pointer"}}>
                削除する
              </button>
            </div>
          </div>
        </div>
      )}

      {toast&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#2d2016",color:"white",padding:"10px 24px",borderRadius:24,fontSize:13,fontWeight:600,boxShadow:"0 4px 16px rgba(0,0,0,0.2)",zIndex:100}}>
          {toast}
        </div>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(SalonApp));
</script>
</body>
</html>
